excluded:
  - .build
  - DerivedData
  - .derivedData

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - db
    - id
    - lh
    - rh

line_length:
  warning: 200
  error: 300
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 600

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 80
  error: 120

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4
  error: 5

nesting:
  type_level: 2
  function_level: 3
