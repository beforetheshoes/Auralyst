excluded:
  - .build
  - DerivedData
  - AuralystAppUITests

disabled_rules:
  - identifier_name
  - type_body_length
  - file_length
  - function_body_length
  - large_tuple
  - trailing_comma
  - nesting
  - cyclomatic_complexity
  - force_cast
  - force_try
  - multiple_closures_with_trailing_closure
  - trailing_newline
  - function_parameter_count

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count

line_length:
  warning: 200
  error: 300
  ignores_comments: true
  ignores_urls: true
