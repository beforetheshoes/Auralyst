excluded:
  - .build
  - DerivedData
  - AuralystAppUITests

disabled_rules:
  - identifier_name
  - type_body_length
  - file_length
  - function_body_length
  - large_tuple
  - trailing_comma
  - nesting
  - cyclomatic_complexity
  - force_cast

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - discouraged_optional_boolean
  - force_unwrapping
  - implicitly_unwrapped_optional
  - multiline_arguments
  - vertical_whitespace_closing_braces

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
