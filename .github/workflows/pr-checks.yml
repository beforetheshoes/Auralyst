name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  SCHEME: AuralystApp
  SWIFT_ENABLE_EXPERIMENTAL_FEATURES: Macros
  SWIFT_EXPERIMENTAL_FEATURES: Macros
  SWIFT_FLAGS: -enable-experimental-feature Macros
  SWIFTPM_ENABLE_MACROS: 1
  SWIFTPM_EXPERIMENTAL_FEATURES: Macros
  SWIFT_BUILD_ENABLE_PLUGIN_AUTO_TRUST: 1

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Trust Xcode plugins
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Build for testing
        run: |
          device=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          xcodebuild build-for-testing \
            -project AuralystApp.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$device" \
            -skipPackagePluginValidation \
            SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin'

  test:
    name: Test
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Trust Xcode plugins
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Run unit tests
        run: |
          device=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          xcodebuild test \
            -project AuralystApp.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$device" \
            -skip-testing:AuralystAppUITests \
            -resultBundlePath TestResults.xcresult \
            -skipPackagePluginValidation \
            SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult

  analyze:
    name: Analyze
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Trust Xcode plugins
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build and analyze
        run: |
          device=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          set -o pipefail
          xcodebuild clean build analyze \
            -project AuralystApp.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$device" \
            -skipPackagePluginValidation \
            SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin' \
            2>&1 | xcpretty && exit ${PIPESTATUS[0]}

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
