name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  SCHEME: AuralystApp
  XCODE_FLAGS: >-
    -project AuralystApp.xcodeproj
    -scheme AuralystApp
    -skipPackagePluginValidation
    CODE_SIGN_IDENTITY="-"
    CODE_SIGNING_REQUIRED=NO
    CODE_SIGNING_ALLOWED=NO
    ENABLE_USER_SCRIPT_SANDBOXING=NO
    SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros
    OTHER_SWIFT_FLAGS=$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin

jobs:
  unit-tests:
    name: Unit Tests & Analyze
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Trust Xcode plugins and macros
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('AuralystApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Detect simulator
        run: |
          DEVICE=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          echo "DEVICE=$DEVICE" >> "$GITHUB_ENV"

      - name: Build, analyze, and run unit tests
        run: |
          xcodebuild analyze test \
            -project AuralystApp.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -only-testing:AuralystAppTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin'

      - name: Enforce code coverage gate
        env:
          # Coverage gate percentage (0–100). Adjust as coverage improves.
          # Current baseline is ~31% — the app target includes SwiftUI views,
          # live CloudKit/SyncEngine code, and preview helpers that are not
          # reachable from unit tests. 100% of the full target is not achievable
          # without UI tests.
          COVERAGE_GATE: "30"
        run: |
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for target in data.get('targets', []):
              if 'AuralystApp' in target.get('name', ''):
                  print(f\"{target['lineCoverage'] * 100:.1f}\")
                  sys.exit(0)
          print('0.0')
          ")
          echo "Code coverage: ${COVERAGE}%  (gate: ${COVERAGE_GATE}%)"
          python3 -c "
          cov = float('$COVERAGE')
          gate = float('$COVERAGE_GATE')
          if cov < gate:
              print(f'FAIL: Coverage {cov:.1f}% is below {gate:.0f}% gate')
              exit(1)
          else:
              print(f'PASS: Coverage {cov:.1f}% meets {gate:.0f}% gate')
          "

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults.xcresult

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
