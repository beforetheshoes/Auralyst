name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  SCHEME: AuralystApp
  SWIFT_ENABLE_EXPERIMENTAL_FEATURES: Macros
  SWIFT_EXPERIMENTAL_FEATURES: Macros
  SWIFT_FLAGS: -enable-experimental-feature Macros
  SWIFTPM_ENABLE_MACROS: 1
  SWIFTPM_EXPERIMENTAL_FEATURES: Macros
  SWIFT_BUILD_ENABLE_PLUGIN_AUTO_TRUST: 1
  ENABLE_USER_SCRIPT_SANDBOXING: NO

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Trust Xcode plugins and macros
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Build and test
        run: |
          xcodebuild test \
            -project AuralystApp.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=macOS" \
            -skip-testing:AuralystAppUITests \
            -resultBundlePath TestResults.xcresult \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult

  analyze:
    name: Analyze
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Trust Xcode plugins and macros
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Build and analyze
        run: |
          xcodebuild clean build analyze \
            -project AuralystApp.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=macOS" \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin'

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
