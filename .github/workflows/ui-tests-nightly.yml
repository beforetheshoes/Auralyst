name: iOS UI Tests (Nightly)

on:
  workflow_dispatch:

jobs:
  ui-tests:
    name: Run UI tests on simulator
    runs-on: macos-15
    env:
      SWIFT_ENABLE_EXPERIMENTAL_FEATURES: Macros
      SWIFT_EXPERIMENTAL_FEATURES: Macros
      SWIFT_FLAGS: -enable-experimental-feature Macros
      SWIFTPM_ENABLE_MACROS: 1
      SWIFTPM_EXPERIMENTAL_FEATURES: Macros
      SWIFT_BUILD_ENABLE_PLUGIN_AUTO_TRUST: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"
      - name: Trust Xcode plugins
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default
      - name: Test (UI)
        env:
          scheme: ${{ 'default' }}
          platform: ${{ 'iOS Simulator' }}
        run: |
          # xcrun xctrace returns via stderr, not the expected stdout (see https://developer.apple.com/forums/thread/663959)
          device=`xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//"`
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          xcodebuild test -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -destination "platform=$platform,name=$device" -skipPackagePluginValidation SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros OTHER_SWIFT_FLAGS="-enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin"
