name: UI Tests (Nightly)

on:
  schedule:
    - cron: "0 6 * * *" # 2 AM ET / 6 AM UTC
  workflow_dispatch:

jobs:
  ui-tests:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Trust Xcode plugins and macros
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Detect simulator
        run: |
          DEVICE=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          echo "DEVICE=$DEVICE" >> "$GITHUB_ENV"

      - name: Build and run UI tests
        run: |
          xcodebuild test \
            -project AuralystApp.xcodeproj \
            -scheme AuralystApp \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -only-testing:AuralystAppUITests \
            -resultBundlePath UITestResults.xcresult \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SWIFT_ENABLE_EXPERIMENTAL_FEATURES=Macros \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature Macros -enable-experimental-feature CompilerPlugin'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult
