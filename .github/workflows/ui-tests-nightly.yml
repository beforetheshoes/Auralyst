name: UI Tests (Nightly)

on:
  schedule:
    - cron: "0 6 * * *" # 2 AM ET / 6 AM UTC
  workflow_dispatch:

jobs:
  ui-tests:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Trust Xcode plugins and macros
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Build and run UI tests
        run: |
          AURALYST_UI_TEST_RESULT_BUNDLE="$RUNNER_TEMP/UITestResults.xcresult" \
          ./scripts/run_ui_tests.sh

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: ${{ runner.temp }}/UITestResults.xcresult
